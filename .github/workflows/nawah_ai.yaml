name: Nawah AI Execution

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  run-ai:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        # أضفنا --legacy-peer-deps لحل صراع النسخ بين React 19 و Next 15
        run: npm install @google/generative-ai --legacy-peer-deps

      - name: Run Nawah Intelligence Test
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node api/ai_test.js
