name: "Nawah AI-OS Professional Build Pipeline"

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Production Build & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 1. Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. Initialize Environment (Node.js v22)
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 3. Setup Java Environment (Java 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: 4. Web Production Build (Vite)
        run: |
          npm install --legacy-peer-deps
          npm run build
          # ضمان وجود مجلد الويب لـ Capacitor
          if [ -d "dist" ]; then
            rm -rf www && cp -r dist www
          else
            echo "Error: Build directory 'dist' not found!" && exit 1
          fi

      - name: 5. Capacitor Framework Sync
        run: |
          rm -rf android
          npx cap add android
          npx cap sync android

      - name: 6. Advanced Identity Injection (Nawah Customization)
        run: |
          # 6.1 حقن ملف خدمات جوجل
          mkdir -p android/app/
          cat <<EOF > android/app/google-services.json
          {
            "project_info": { "project_number": "162488255991", "project_id": "nawah-aios" },
            "client": [ { "client_info": { "mobilesdk_app_id": "1:162488255991:android:73d6299f11a1b7aec61af2", "android_client_info": { "package_name": "com.nawah.aios" } }, "api_key": [ { "current_key": "AIzaSyAKjsgnoHnGGr3urhm6Kpu7RvxN2dp6sJQ" } ], "services": { "appinvite_service": { "other_platform_oauth_client": [] } } } ],
            "configuration_version": "1"
          }
          EOF

          # 6.2 تحديث Build.gradle باستخدام تقنيات بحث واستبدال دقيقة
          GRADLE_FILE="android/app/build.gradle"
          sed -i 's/namespace .*/namespace "com.nawah.aios"/' $GRADLE_FILE
          sed -i 's/applicationId .*/applicationId "com.nawah.aios"/' $GRADLE_FILE
          
          # 6.3 تحديث الموارد النصية (App Name)
          STRINGS_FILE="android/app/src/main/res/values/strings.xml"
          sed -i 's/<string name="app_name">.*<\/string>/<string name="app_name">Nawah AI-OS<\/string>/' $STRINGS_FILE

      - name: 7. Native Android Compilation (Release Mode)
        working-directory: ./android
        run: |
          chmod +x gradlew
          # معالجة تعارضات المكتبات الشائعة وزيادة كفاءة الذاكرة لـ Gradle
          echo "configurations.all { resolutionStrategy.eachDependency { details -> if (details.requested.name == 'bcprov-jdk18on') { details.useVersion '1.78.1' } } }" >> build.gradle
          ./gradlew assembleRelease --no-daemon -Dorg.gradle.parallel=true -Dorg.gradle.jvmargs="-Xmx3072m"

      - name: 8. Secure Artifact Signing
        run: |
          # إنشاء مفتاح توقيع مؤقت مشفر
          keytool -genkey -v -keystore nawah_release.jks -alias nawah_alias -keyalg RSA -keysize 2048 -validity 10000 -storepass "nawah_secure_2026" -keypass "nawah_secure_2026" -dname "CN=NawahAI, O=Nawah, C=EG" -noprompt
          
          # تحديد مسار الملف المنتج بدقة
          RAW_APK=$(find android/app/build/outputs/apk/release/ -name "*.apk" | head -n 1)
          
          # استخدام apksigner الاحترافي من الـ SDK
          BUILD_TOOLS_VERSION=$(ls $ANDROID_HOME/build-tools | sort -V | tail -n 1)
          $ANDROID_HOME/build-tools/$BUILD_TOOLS_VERSION/apksigner sign --ks nawah_release.jks --ks-pass pass:"nawah_secure_2026" --out Nawah-AIOS-v2.apk "$RAW_APK"

      - name: 9. Automated Deployment to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.0.${{ github.run_number }}
          name: "Nawah AI-OS Production v2.0.${{ github.run_number }}"
          draft: false
          prerelease: false
          body: |
            ## 🚀 Nawah AI-OS Deployment Successful
            
            **Release Details:**
            - **Build ID:** `${{ github.run_id }}`
            - **Package Name:** `com.nawah.aios`
            - **Engine:** Node.js 22 + Vite 6
            - **Status:** Signed & Production Ready
            
            *This build was automatically generated by Nawah Professional Pipeline.*
          files: Nawah-AIOS-v2.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
