- name: 2. Setup Node.js (v22)
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          # تم إزالة سطر cache: 'npm' لأنه يسبب الخطأ إذا لم يوجد package-lock.json

      - name: 4. Build Web Project (Vite)
        run: |
          # نستخدم install لإنشاء الملفات المفقودة
          npm install --legacy-peer-deps
          
          # التأكد من بناء المشروع
          npm run build
          
          # إنشاء مجلد www والتأكد من نقل الملفات إليه لـ Capacitor
          mkdir -p www
          if [ -d "dist" ]; then
            cp -r dist/* www/
          else
            echo "Error: dist directory not found. Build might have failed."
            exit 1
          fi
