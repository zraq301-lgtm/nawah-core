name: "Nawah AI-OS Professional Build Pipeline"

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build & Release Nawah AI-OS
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 2. Setup Node.js (v22)
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          # تم إزالة سطر cache: 'npm' لحل مشكلة الـ lock file المفقود

      - name: 3. Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 4. Production Web Build
        run: |
          # استخدام install بدون الاعتماد على lock file
          npm install --legacy-peer-deps --no-package-lock
          npm run build
          mkdir -p www
          [ -d "dist" ] && cp -r dist/* www/ || cp -r build/* www/

      - name: 5. Android Environment Sync
        run: |
          rm -rf android
          npx cap add android
          npx cap sync android

      - name: 6. Nawah Identity & Firebase Injection
        run: |
          mkdir -p android/app/
          cat <<EOF > android/app/google-services.json
          {
            "project_info": { "project_number": "162488255991", "project_id": "nawah-aios" },
            "client": [ { "client_info": { "mobilesdk_app_id": "1:162488255991:android:73d6299f11a1b7aec61af2", "android_client_info": { "package_name": "com.nawah.aios" } }, "api_key": [ { "current_key": "AIzaSyAKjsgnoHnGGr3urhm6Kpu7RvxN2dp6sJQ" } ], "services": { "appinvite_service": { "other_platform_oauth_client": [] } } } ],
            "configuration_version": "1"
          }
          EOF
          
          GRADLE="android/app/build.gradle"
          sed -i 's/namespace .*/namespace "com.nawah.aios"/' $GRADLE
          sed -i 's/applicationId .*/applicationId "com.nawah.aios"/' $GRADLE
          
          STRINGS="android/app/src/main/res/values/strings.xml"
          [ -f "$STRINGS" ] && sed -i 's/<string name="app_name">.*<\/string>/<string name="app_name">Nawah AI-OS<\/string>/' $STRINGS

      - name: 7. Gradle Compilation
        working-directory: ./android
        run: |
          chmod +x gradlew
          echo "configurations.all { resolutionStrategy.eachDependency { details -> if (details.requested.name == 'bcprov-jdk18on') { details.useVersion '1.78.1' } } }" >> build.gradle
          ./gradlew assembleRelease --no-daemon -Dorg.gradle.jvmargs="-Xmx3072m"

      - name: 8. Secure Signing
        run: |
          keytool -genkey -v -keystore nawah.jks -alias nawah_alias -keyalg RSA -keysize 2048 -validity 10000 -storepass "nawah2026" -keypass "nawah2026" -dname "CN=Nawah, O=AI, C=EG" -noprompt
          APK_RAW=$(find android/app/build/outputs/apk/release/ -name "*.apk" | head -n 1)
          SDK_PATH=$(ls -d $ANDROID_HOME/build-tools/* | tail -n 1)
          $SDK_PATH/apksigner sign --ks nawah.jks --ks-pass pass:"nawah2026" --out Nawah-AIOS-v2.apk "$APK_RAW"

      - name: 9. Deploy Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.0.${{ github.run_number }}
          name: "Nawah AI-OS Build v2.0.${{ github.run_number }}"
          files: Nawah-AIOS-v2.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
