   name: ERP React Analyzer (Java Powered)

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master, dev ]

# منح الصلاحية للأكشن لتحديث ورفع ملف القفل إلى المستودع تلقائياً
permissions:
  contents: write

jobs:
  analyze-data-flow:
    runs-on: ubuntu-latest

    steps:
      # 1. جلب الكود من المستودع
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. إعداد بيئة جافا (لتشغيل سكربت التحليل)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. إعداد بيئة Node.js لتشغيل فحص الـ React
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # 4. تثبيت الحزم وتحديث ملف القفل تلقائياً
      - name: Install Dependencies, Update Lockfile & Type Check
        run: |
          npm install
          npm run build --if-present

      # 5. تشغيل الفحص وتصدر النتيجة إلى ملف JSON
      - name: Run ESLint and Export JSON
        run: |
          npx eslint "src/**/*.{ts,tsx,js,jsx}" --format json --output-file eslint-report.json || true

      # 6. كتابة وتشغيل سكربت الجافا لتحليل أخطاء نقل البيانات والـ Bugs
      - name: Compile and Run Java Analyzer
        run: |
          cat << 'EOF' > Analyzer.java
          import java.io.File;
          import java.nio.file.Files;
          import java.nio.file.Paths;
          import java.nio.file.StandardOpenOption;
          import java.util.regex.Matcher;
          import java.util.regex.Pattern;

          public class Analyzer {
              public static void main(String[] args) {
                  try {
                      File file = new File("eslint-report.json");
                      if (!file.exists()) {
                          System.out.println("لم يتم العثور على ملف التقرير.");
                          return;
                      }

                      String jsonContent = new String(Files.readAllBytes(Paths.get("eslint-report.json")));
                      String summaryPath = System.getenv("GITHUB_STEP_SUMMARY");
                      
                      StringBuilder summary = new StringBuilder();
                      summary.append("## 📊 تقرير جافا الدقيق لتحليل بيانات الـ ERP:\n---\n");

                      Pattern filePattern = Pattern.compile("\\{\"filePath\":\"(.*?)\",\"messages\":\\[(.*?)\\]");
                      Matcher fileMatcher = filePattern.matcher(jsonContent);

                      int totalBugs = 0;

                      while (fileMatcher.find()) {
                          String filePath = fileMatcher.group(1);
                          String messagesBlock = fileMatcher.group(2);

                          if (filePath.contains("src/")) {
                              filePath = "src/" + filePath.split("src/")[1];
                          }

                          if (!messagesBlock.isEmpty()) {
                              StringBuilder fileLog = new StringBuilder();
                              fileLog.append("### 📄 ملف: `").append(filePath).append("`\n");
                              
                              Pattern msgPattern = Pattern.compile("\\{\"ruleId\":\"(.*?)\",\"severity\":(\\d),\"message\":\"(.*?)\",\"line\":(\\d+)");
                              Matcher msgMatcher = msgPattern.matcher(messagesBlock);
                              
                              boolean hasCriticalBugs = false;
                              while (msgMatcher.find()) {
                                  String ruleId = msgMatcher.group(1);
                                  int severity = Integer.parseInt(msgMatcher.group(2));
                                  String message = msgMatcher.group(3);
                                  String line = msgMatcher.group(4);

                                  String type = (severity == 2) ? "🔴 Bug حرج في نقل البيانات" : "⚠️ تحذير";
                                  if (severity == 2) {
                                      totalBugs++;
                                      hasCriticalBugs = true;
                                  }

                                  fileLog.append("- **[").append(type).append("]** سطر ").append(line)
                                         .append(": ").append(message).append(" *(").append(ruleId).append(")*\n");
                              }

                              if (hasCriticalBugs) {
                                  summary.append(fileLog.toString());
                              }
                          }
                      }

                      if (totalBugs == 0) {
                          summary.append("### ✅ ممتاز! تم فحص استدعاءات ونقل البيانات بنجاح ولا يوجد أي Bugs حرج في الصفحات الجديدة.\n");
                      } else {
                          summary.append("\n❌ **تم إيقاف الرفع! يوجد عدد (")
                                 .append(totalBugs)
                                 .append(") أخطاء حرجة في نقل واستدعاء البيانات يجب إصلاحها أولاً.**\n");
                      }

                      Files.write(Paths.get(summaryPath), summary.toString().getBytes(), StandardOpenOption.APPEND);

                      if (totalBugs > 0) {
                          System.exit(1);
                      }

                  } catch (Exception e) {
                      System.err.println("حدث خطأ أثناء تحليل السجل بالجافا: " + e.getMessage());
                      System.exit(1);
                  }
              }
          }
          EOF
          
          java Analyzer.java

      # 7. تحديث ونقل ملف القفل المحدث مباشرة وتلقائياً إلى جيت هب في حال نجاح الفحص
      - name: Commit and Push Updated package-lock.json
        if: success()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: automated package-lock.json synchronization"
            git push origin HEAD:${{ github.ref_name }}
          else
            echo "ملف القفل متطابق ومتزامن بالفعل، لا حاجة للرفع."
          fi                 
