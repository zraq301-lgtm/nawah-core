generator client {
  provider        = "prisma-client-js"
  previewFeatures = ["multiSchema"] // تفعيل ميزة الشاشات المتعددة لتشغيل العزل الفولاذي 🛡️
}

datasource db {
  provider  = "postgresql"
  url       = env("DATABASE_URL")
  directUrl = env("DIRECT_URL")
  schemas   = ["public", "base_template"] // تحديد الـ Schemas الأساسية للنظام
}

// ==========================================
// 1. جداول النظام العامة (تكون في الـ public schema لإدارة الحسابات والشركات)
// ==========================================

model Company {
  id        String   @id @default(uuid())
  name      String
  createdAt DateTime @default(now())
  users     User[]

  @@schema("public") // حفر الجدول داخل الـ public schema
}

model User {
  id            String         @id @default(uuid())
  email         String         @unique
  password      String
  companyId     String?
  company       Company?       @relation(fields: [companyId], references: [id])
  purchases     Purchase[]
  orderRequests OrderRequest[]

  @@schema("public") // حفر الجدول داخل الـ public schema
}

// ==========================================
// 2. جداول الـ ERP (الـ Template الرئيسي الذي سيتم النسخ منه تلقائياً لكل عميل)
// ==========================================

model Purchase {
  id             String   @id @default(uuid())
  item           String   
  unit           String?  
  quantity       Float    
  price          Float    
  total          Float    
  supplier       String?  
  payment_method String   @default("كاش") 
  purchase_date  String?  
  batch_id       String?  
  created_at     DateTime @default(now())
  
  // حقول الربط داخل الـ Template
  userId         String
  user           User     @relation(fields: [userId], references: [id])

  @@map("purchases")
  @@schema("base_template") // حفر الجدول داخل الـ base_template
}

model OrderRequest {
  id         String   @id @default(uuid())
  item       String   
  quantity   Float    
  supplier   String   @default("عام") 
  type       String   @default("ERP_ORDER_REQUEST")
  created_at DateTime @default(now())
  
  // حقول الربط داخل الـ Template
  userId     String
  user       User     @relation(fields: [userId], references: [id])

  @@map("order_requests")
  @@schema("base_template") // حفر الجدول داخل الـ base_template
}
