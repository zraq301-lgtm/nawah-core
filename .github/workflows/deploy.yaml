name: Automated Build Verification 🚀

on:
  push:
    branches:
      - main

jobs:
  verify-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository 📂
        uses: actions/checkout@v4

      - name: Setup Node.js 🟢
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies 📦
        run: npm install

      # توليد الكلاينت محلياً داخل جيت هب للتأكد من سلامة كود التايب سكريبت
      - name: Generate Prisma Client 📝
        run: npx prisma generate

      # بناء التطبيق للتأكد من سلامة الأكواد قبل النشر
      - name: Build Application 🛠️
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          DATABASE_URL: "postgresql://postgres:dummy@localhost:5432/postgres" # رابط وهمي لتخطي حاجز البناء فقط
