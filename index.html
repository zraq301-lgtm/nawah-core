<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nawah AI - Groq Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen flex items-center justify-center p-4">

    <div class="bg-slate-800 p-8 rounded-2xl shadow-2xl w-full max-w-lg border border-slate-700">
        <h1 class="text-2xl font-bold mb-6 text-center text-orange-400">Nawah AI x Groq ⚡</h1>
        
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium mb-1 text-slate-400">Groq API Key</label>
                <input type="password" id="apiKey" placeholder="gsk_..." 
                    class="w-full p-3 rounded-lg bg-slate-700 border border-slate-600 focus:border-orange-500 text-white outline-none">
            </div>

            <div>
                <label class="block text-sm font-medium mb-1 text-slate-400">سؤالك للمصنع الذكي</label>
                <textarea id="userPrompt" rows="3" 
                    class="w-full p-3 rounded-lg bg-slate-700 border border-slate-600 focus:border-orange-500 text-white outline-none">اقترح فكرة تقنية لزيادة إنتاج مصنع معمول</textarea>
            </div>

            <button onclick="askGroq()" id="btn"
                class="w-full bg-orange-600 hover:bg-orange-700 text-white font-bold py-3 rounded-lg transition-all active:scale-95">
                تشغيل محرك Groq الصاروخي
            </button>

            <div id="response" class="mt-6 p-4 bg-slate-900 rounded-lg border border-slate-700 min-h-[50px] text-slate-300 text-sm hidden">
                </div>
        </div>
    </div>

    <script>
        async function askGroq() {
            const key = document.getElementById('apiKey').value;
            const promptText = document.getElementById('userPrompt').value;
            const resDiv = document.getElementById('response');
            const btn = document.getElementById('btn');

            if (!key) return alert("برجاء إدخال مفتاح Groq أولاً");

            resDiv.classList.remove('hidden');
            resDiv.innerText = "جاري الاتصال بـ Groq...";
            btn.disabled = true;

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${key}`
                    },
                    body: JSON.stringify({
                        model: "llama3-8b-8192", // موديل سريع جداً وذكي
                        messages: [{ role: "user", content: promptText }]
                    })
                });

                const data = await response.json();

                if (data.error) {
                    resDiv.innerHTML = `<span class="text-red-400">خطأ: ${data.error.message}</span>`;
                } else {
                    resDiv.innerText = data.choices[0].message.content;
                }
            } catch (err) {
                resDiv.innerHTML = `<span class="text-red-400">خطأ في الشبكة: ${err.message}</span>`;
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
