name: Automated Deployment & Prisma Sync 🚀

on:
  push:
    branches:
      - main # أو استبدله بـ master حسب اسم الفرع الرئيسي عندك

jobs:
  deploy-and-sync:
    runs-on: ubuntu-latest

    steps:
      # 1. جلب الكود من المستودع
      - name: Checkout Repository 📂
        uses: actions/checkout@v4

      # 2. إعداد بيئة عمل Node.js
      - name: Setup Node.js 🟢
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm' # لتسريع العمليات القادمة عبر الكاش

      # 3. تثبيت الحزم والاعتماديات
      - name: Install Dependencies 📦
        run: npm ci # استخدام ci أضمن وأسرع في بيئات الـ CI/CD

      # 4. المزامنة السحرية: دفع هيكل بريزما إلى سوبابيز بدون أوامر يدوية
      - name: Push Prisma Schema to Supabase ☁️
        run: npx prisma db push --accept-data-loss
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}

      # 5. بناء تطبيق الـ Vite / React للإنتاج
      - name: Build Application 🛠️
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      # 6. خطوة النشر الفعلي (النشر هنا كمثال، يمكنك توجيهه إلى السيرفر الخاص بك)
      - name: Deploy Production Artifacts 🚀
        run: |
          echo "جاري تشغيل خطة النشر والرفع النهائي لجت هب..."
          # هنا يمكنك إضافة خطة النشر الخاصة بك (مثل الرفع إلى خادم، أو بناء أندرويد عبر Capacitor)
